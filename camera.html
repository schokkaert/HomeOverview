      <section class="panel camera-detail-panel" id="camera-detail-panel"></section>
    </main>

    <dialog class="login-dialog" id="camera-login-dialog">
      <form method="dialog" id="camera-login-form">
        <div class="dialog-heading">
          <h2>Foscam login</h2>
          <button class="icon-button" type="button" id="camera-login-close" aria-label="Sluiten">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6.4 5 5.6 5.6L17.6 5 19 6.4 13.4 12l5.6 5.6-1.4 1.4-5.6-5.6L6.4 19 5 17.6l5.6-5.6L5 6.4 6.4 5Z"/></svg>
          </button>
        </div>
        <label>
          <span>Gebruiker</span>
          <input id="camera-username" name="username" type="text" autocomplete="username">
        </label>
        <label>
          <span>Wachtwoord</span>
          <input id="camera-password" name="password" type="password" autocomplete="current-password">
        </label>
        <button class="primary-button" type="submit">Bewaren</button>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
